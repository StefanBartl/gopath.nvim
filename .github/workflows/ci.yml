name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: stylua (format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/

  luacheck:
    name: luacheck (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"
      - uses: leafo/gh-actions-luarocks@v4
      - run: luarocks install luacheck
      - run: luacheck lua plugin

  headless-tests:
    name: headless smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: deps/lib.nvim
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - run: |
          nvim --headless --noplugin -u NONE \
            --cmd "set runtimepath+=${{ github.workspace }}/deps/lib.nvim" \
            -c "lua dofile('scripts/ci/headless_tests.lua')"
